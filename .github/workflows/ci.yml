name: CI

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
            backend:
              - 'backend/**'
              - 'package.json'
              - 'package-lock.json'

  # GitLab: code_quality
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm
      - run: npm ci --workspaces=false
      - run: npm run lint:eslint
      - run: npm run lint:prettier

  # GitLab: frontend-test
  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm
      - run: npm ci -w frontend --include-workspace-root
      - run: npm run test:unit -w frontend
      - run: npm run init:playwright -w frontend
      - run: npm run test:component -w frontend

  # GitLab: frontend-e2e (Playwright auto-starts frontend + backend + Firebase emulators)
  frontend-e2e:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run init:playwright -w frontend
      - run: npm run test:e2e -w frontend
        env:
          GOOGLE_CLIENT_EMAIL: e2e@example.com
          GOOGLE_PRIVATE_KEY: e2e-emulator-placeholder
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

  # GitLab: backend-unit + backend-e2e
  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm
      - run: npm ci -w backend --include-workspace-root
      - run: npm run test -w backend
      - run: npm run test:e2e-emulator -w backend

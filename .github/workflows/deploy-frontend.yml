name: Deploy Frontend

on:
  workflow_call:
    inputs:
      environment:
        description: Target GitHub Environment (dev or production)
        type: string
        required: true
      version:
        description: Value injected as VITE_VERSION
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - dev
          - production
        default: dev

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: npm

      - run: npm ci -w frontend --include-workspace-root

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_VERSION: ${{ inputs.version || github.sha }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      # GitLab: decode the base64 service-account key and point ADC at it.
      - name: Authenticate to Google Cloud
        env:
          GOOGLE_APPLICATION_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BASE64 }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_BASE64" | base64 -d > "$RUNNER_TEMP/gcloud-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcloud-key.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: >-
          npx --yes firebase-tools deploy
          --only hosting
          --project ${{ vars.FIREBASE_PROJECT_ID }}
          --non-interactive

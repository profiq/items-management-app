backend-unit:
  stage: test
  extends:
    - .rule_mr_and_main_backend
    - .npm_ci_backend
  script:
    - npm run test -w backend

backend-e2e:
  stage: test
  extends:
    - .rule_mr_and_main_backend
    - .npm_ci_backend
  script:
    - npm run test:e2e-emulator -w backend

code_review:
  image: $NODE_JAVA_IMAGE:latest
  stage: code_review
  # AI-based analysis may fail due to network errors or service availability
  retry: 2
  allow_failure: true
  timeout: 1h
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DRAFT != "true" && $CI_MERGE_REQUEST_LABELS =~ /Waiting for review/
  variables:
    AUGMENT_SESSION_AUTH: $AUGMENT_CLI_SESSION_KEY
  resource_group: code-review-mr-${CI_MERGE_REQUEST_IID}
  before_script:
    - glab auth login --hostname $CI_SERVER_HOST -t $GLAB_TOKEN
    - glab auth status || (echo "GitLab authentication failed" && exit 1)
    - export AUGMENT_RETRY_TIMEOUT=${AUGMENT_RETRY_TIMEOUT:-120}
  script:
    - auggie --print --retry-timeout "$AUGMENT_RETRY_TIMEOUT" "/review-code mr:${CI_MERGE_REQUEST_IID}"
    - auggie --print --retry-timeout "$AUGMENT_RETRY_TIMEOUT" "/filter-review auto"
    - auggie --print --retry-timeout "$AUGMENT_RETRY_TIMEOUT" "/post-review auto"

backend-build-dev:
  image:
    name: moby/buildkit:rootless
    entrypoint: ['']
  stage: build
  tags:
    - profiq
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
      variables:
        IMAGE_TAG: ${CI_MERGE_REQUEST_ID}
      changes:
        - backend/**/*
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        IMAGE_TAG: ${CI_COMMIT_SHA}
      changes:
        - backend/**/*

  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    # due to permission issues with Docker in Docker (DinD), we use buildkit (https://docs.gitlab.com/ci/docker/using_buildkit/)
    # which does not support docker login and docker build commands, so we have to use direct echo of the credentials
    - mkdir -p ~/.docker
    - |
      echo "{
        \"auths\": {
          \"europe-central2-docker.pkg.dev\": {
            \"auth\": \"$(printf "%s:%s" "_json_key_base64" "${GOOGLE_APPLICATION_CREDENTIALS_BASE64}" | base64 -w0)\"
          }
        }
      }" > ~/.docker/config.json

  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --opt platform=linux/amd64 \
        --local context=. \
        --local dockerfile=backend/ \
        --output type=image,\"name=${IMAGE_NAME}:${IMAGE_TAG},${IMAGE_NAME}:latest\",push=true
  environment:
    name: dev
    action: prepare

backend-build-production:
  extends:
    - backend-build-dev

  rules:
    - if: $CI_COMMIT_TAG
      variables:
        IMAGE_NAME: ${PROD_IMAGE_NAME}
        IMAGE_TAG: ${CI_COMMIT_TAG}
  environment:
    name: production
    action: prepare

.frontend-build:
  artifacts:
    expire_in: '1 hour'
    paths:
      - frontend/dist
  before_script:
    - npm ci -w frontend --include-workspace-root
  script:
    - npm run build -w frontend

frontend-build-dev:
  stage: build
  extends:
    - .rule_mr_and_main_frontend
    - .frontend-build
  variables:
    VITE_VERSION: ${CI_COMMIT_SHORT_SHA}
  environment:
    name: dev
    action: prepare

frontend-build-production:
  stage: build
  extends:
    - .frontend-build
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    VITE_VERSION: ${CI_COMMIT_TAG}
  environment:
    name: production
    action: prepare

.frontend-deploy:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - frontend/**/*
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - frontend/**/*
  before_script:
    - npm ci -w frontend --include-workspace-root
    - echo "$GOOGLE_APPLICATION_CREDENTIALS_BASE64" | base64 -d > "$CI_PROJECT_DIR"/gcloud-service-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS="$CI_PROJECT_DIR"/gcloud-service-key.json
  script:
    - npm run deploy -w frontend -- --non-interactive

frontend-deploy-dev:
  stage: deploy
  extends:
    - .frontend-deploy
  needs:
    - frontend-build-dev
  environment: dev

frontend-deploy-production:
  stage: deploy
  extends:
    - .frontend-deploy
  needs:
    - frontend-build-production
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - npm run deploy:production -w frontend -- --non-interactive
  environment: production

.backend-deploy:
  image: gcr.io/google.com/cloudsdktool/google-cloud-cli:557.0.0-stable
  needs:
    - backend-build-dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
      variables:
        IMAGE_TAG: ${CI_MERGE_REQUEST_ID}
      changes:
        - backend/**/*

    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        IMAGE_TAG: ${CI_COMMIT_SHA}
      changes:
        - backend/**/*

  before_script:
    - echo "$GOOGLE_APPLICATION_CREDENTIALS_BASE64" | base64 -d > "$CI_PROJECT_DIR"/gcloud-service-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS="$CI_PROJECT_DIR"/gcloud-service-key.json
    - gcloud auth login --cred-file="$CI_PROJECT_DIR"/gcloud-service-key.json
  script:
    - gcloud run services --project $VITE_FIREBASE_PROJECT_ID --region europe-west1 update pq-reference-backend-dev --image $IMAGE_NAME:$IMAGE_TAG

backend-deploy-dev:
  stage: deploy
  extends:
    - .backend-deploy
  environment: dev

backend-deploy-production:
  stage: deploy
  extends:
    - .backend-deploy
  needs:
    - backend-build-production
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        IMAGE_NAME: ${PROD_IMAGE_NAME}
        IMAGE_TAG: ${CI_COMMIT_TAG}
  script:
    - gcloud run services --project $VITE_FIREBASE_PROJECT_ID --region europe-west1 update pq-reference-backend-prod --image $IMAGE_NAME:$IMAGE_TAG

  environment: production

update_changelog:
  stage: update_changelog
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    # disable shallow clone
    GIT_DEPTH: 0
  before_script:
    - npm ci --workspaces=false
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@example.invalid"
    # ensure we do not have local tags
    - git fetch --prune --prune-tags
    - git switch main
    - git reset --hard origin/main

  script:
    - npm version --no-git-tag-version "${CI_COMMIT_TAG}"
    # the changelog generator expects the workflow to follow tag after bump,
    # so delete the local version of the tag
    - git tag -d "${CI_COMMIT_TAG}"
    - npm run changelog:update
    - git add .
    - 'git commit -m "chore(changelog): update changelog to ${CI_COMMIT_TAG}"'
    - git push origin HEAD:main
    - npm run --silent changelog:stdout > changes.md
    - git tag "${CI_COMMIT_TAG}"
    - git push --force --tags
  artifacts:
    when: on_success
    access: all
    expire_in: '30 minutes'
    paths:
      - changes.md

update_release_notes:
  image: registry.gitlab.com/gitlab-org/cli:latest
  needs:
    - update_changelog
  rules:
    - if: $CI_COMMIT_TAG
  stage: update_changelog
  script:
    - glab auth login --hostname $CI_SERVER_HOST --job-token $CI_JOB_TOKEN
    - glab release create "${CI_COMMIT_TAG}" -F changes.md

build_node_java:
  stage: manual_prepare
  when: manual
  image:
    name: moby/buildkit:rootless
    entrypoint: ['']
  tags:
    - profiq
  extends:
    - .rule_mr_and_main
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    # due to permission issues with Docker in Docker (DinD), we use buildkit (https://docs.gitlab.com/ci/docker/using_buildkit/)
    # which does not support docker login and docker build commands, so we have to use direct echo of the credentials
    - mkdir -p ~/.docker
    - |
      echo "{
        \"auths\": {
          \"${CI_REGISTRY}\": {
            \"auth\": \"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)\"
          }
        }
      }" > ~/.docker/config.json

  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --output type=image,\"name=${NODE_JAVA_IMAGE}:latest\",push=true

code_quality:
  stage: code_quality
  extends:
    - .rule_mr_and_main
    - .npm_ci_only_root
  script:
    - npm run lint:eslint
    - npm run lint:prettier

frontend-test:
  stage: test
  extends:
    - .rule_mr_and_main_frontend
    - .npm_ci_frontend
  script:
    # if unit tests fail, there is no reason to waste time installing playwright
    # so run it first
    - npm run test:unit -w frontend
    - npm run init:playwright -w frontend
    - npm run test:component -w frontend

frontend-e2e:
  stage: test
  extends:
    - .rule_mr_and_main_frontend
  image: $NODE_JAVA_IMAGE:latest
  before_script:
    - npm ci
  script:
    - npm run test:e2e -w frontend
  environment:
    name: dev
    action: verify
  artifacts:
    when: always
    access: all
    expire_in: '7 days'
    paths:
      - frontend/test-results/
      - frontend/playwright-report/


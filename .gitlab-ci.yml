default:
  image: node:22.21.1
  tags:
    - profiq
#  # cache is disabled due to slowdown it causes in this small pipeline
#  # but on bigger projects, it can be beneficial to enable. The way to enable
#  # it can be found in the comments
#  cache: &default_cache
#    key:
#      files:
#        - 'package-lock.json'
#        - '**/package.json'
#    paths:
#      - .npm
#    policy: pull

stages:
  - manual_prepare
  - code_quality
  - test
  - code_review
  - build
  - deploy
  - update_changelog

variables:
  GIT_DEPTH: 1
  IMAGE_NAME: europe-central2-docker.pkg.dev/pq-reference-app-dev/pq-reference-app-be-dev/backend-dev
  PROD_IMAGE_NAME: europe-central2-docker.pkg.dev/pq-reference-app-prod/pq-reference-app-be-prod/backend-prod
  NODE_JAVA_IMAGE: $CI_REGISTRY_IMAGE/node-java

.set_npm_config:
  before_script:
    - npm config set cache .npm
    - npm config set prefer-offline true

.rule_mr_and_main:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

.rule_mr_and_main_frontend:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - frontend/**/*
    - if: $CI_COMMIT_TAG

.rule_mr_and_main_backend:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
    - if: $CI_COMMIT_TAG

.npm_ci_only_root:
  before_script:
    - !reference [.set_npm_config, before_script]
    - npm ci --workspaces=false

.npm_ci_frontend:
  before_script:
    - !reference [.set_npm_config, before_script]
    - npm ci -w frontend --include-workspace-root

.npm_ci_backend:
  before_script:
    - !reference [.set_npm_config, before_script]
    - npm ci -w backend --include-workspace-root

